name: Security Scanning
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  codeql:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['python']
    steps:
    - uses: actions/checkout@v6
    - uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
    - uses: github/codeql-action/analyze@v3
