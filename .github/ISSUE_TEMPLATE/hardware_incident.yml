name: Hardware Incident
description: Report a field node signal or telemetry anomaly
title: "[HARDWARE] "
labels: ["hardware", "anomaly"]
body:
  - type: markdown
    attributes:
      value: |
        Please use this form to report anomalies specifically related to SDR hardware, GPSDO timing, or telemetry coherence issues.
  - type: textarea
    id: description
    attributes:
      label: Incident Description
      description: Describe the anomaly observed in the field node.
    validations:
      required: true
  - type: input
    id: hardware_config
    attributes:
      label: Hardware Configuration
      description: E.g., Raspberry Pi 5 + PlutoSDR+ + LBE-1421 GPSDO
    validations:
      required: true
  - type: textarea
    id: telemetry_data
    attributes:
      label: Telemetry / Coherence Logs
      description: Paste relevant telemetry data or coherence anomalies.
      render: json
    validations:
      required: true
