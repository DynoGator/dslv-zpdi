name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Pipeline Logs / Error Output
      description: Please paste any relevant error messages or `journalctl -u dslv-zpdi` logs here.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Debian 12 (Bookworm)
        - Debian 13 (Trixie)
        - Ubuntu 24.04
        - Raspbian / Raspberry Pi OS
        - Other
    validations:
      required: true
