# DSLV-ZPDI Kernel Tuning for RF Metrology Pipeline
# Target: Raspberry Pi 5 / Debian Trixie / 16GB
# Phase: 2A RF Metrology (HackRF + LBE-1420 GPSDO)
# Apply: sudo sysctl --system

# ---------------------------------------------------------------------------
# Memory & Swap
# ---------------------------------------------------------------------------
vm.swappiness = 1
vm.dirty_ratio = 5
vm.dirty_background_ratio = 2
vm.dirty_expire_centisecs = 500
vm.dirty_writeback_centisecs = 100

# ---------------------------------------------------------------------------
# Real-Time Scheduling
# ---------------------------------------------------------------------------
kernel.sched_rt_runtime_us = 950000

# ---------------------------------------------------------------------------
# Network Buffers (swarm UDP readiness)
# ---------------------------------------------------------------------------
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.netdev_max_backlog = 5000
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# ---------------------------------------------------------------------------
# Kernel Printk (reduce console noise)
# ---------------------------------------------------------------------------
kernel.printk = 4 4 1 7

# ---------------------------------------------------------------------------
# Filesystem Hardening
# ---------------------------------------------------------------------------
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 1
